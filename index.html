<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMHS Portal - Student Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; 
            max-width: 420px; position: relative; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .settings-link { position: absolute; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 20px; transition: 0.3s; }
        .settings-link:hover { color: #000; transform: rotate(90deg); }
        h2 { text-align: center; color: #333; margin-bottom: 30px; font-size: 26px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #4a90e2; }
        
        /* New Alert Styling */
        .alert-box { 
            display: none; 
            background: #fff5f5; border: 1px solid #feb2b2; color: #b21f1f;
            padding: 15px; border-radius: 10px; font-size: 14px; margin-bottom: 20px;
            text-align: center; line-height: 1.4;
        }

        button { 
            width: 100%; padding: 15px; background: #4a90e2; color: white; 
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 15px; 
        }
        button:hover { background: #2c3e50; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .footer-text { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="login-card">
    <a href="admin.html" class="settings-link"><i class="fa-solid fa-gear"></i></a> 
    <h2>Student Login</h2>

    <div id="errorBox" class="alert-box">
        <strong>No Data Found!</strong><br>
        Please ask your teacher to add you to the database.
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Admission Number</label>
            <input type="text" id="admNo" placeholder="Enter Admission No" required>
        </div>
        <button type="submit" id="loginBtn">Login to Portal</button>
    </form>
    <p class="footer-text">D.S.B.C.C.L.</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhB6Bc29g-sZCV9MLu_jQCD5GdlhL2mgM",
        authDomain: "amhs-e7f6d.firebaseapp.com",
        projectId: "amhs-e7f6d",
        storageBucket: "amhs-e7f6d.firebasestorage.app",
        messagingSenderId: "226999110651",
        appId: "1:226999110651:web:3746238cb0140f1897d95e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Auto-login check
    if (localStorage.getItem("isLoggedIn") === "true") {
        window.location.replace("main.html");
    }

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        loginBtn.disabled = true;
        loginBtn.innerText = "Verifying...";
        errorBox.style.display = "none";

        const adm = document.getElementById('admNo').value.trim();

        try {
            // VERIFICATION LOGIC: Search for the Admission No as the Document ID
            const studentRef = doc(db, "students", adm);
            const docSnap = await getDoc(studentRef);

            if (docSnap.exists()) {
                const data = docSnap.data();

                // Save verified session data
                localStorage.setItem("studentName", data.name);
                localStorage.setItem("studentClass", data.class);
                localStorage.setItem("studentSection", data.section);
                localStorage.setItem("admissionNo", data.admissionNo);
                localStorage.setItem("isLoggedIn", "true");

                window.location.href = "main.html";
            } else {
                // Not found - Show your alert
                errorBox.style.display = "block";
                loginBtn.disabled = false;
                loginBtn.innerText = "Login to Portal";
            }

        } catch (error) {
            console.error("Login Error:", error);
            alert("Connection failed. Check your internet.");
            loginBtn.disabled = false;
            loginBtn.innerText = "Login to Portal";
        }
    });
</script>
</body>
</html>
