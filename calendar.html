<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Calendar - AMHS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a6c; --accent: #f5af19; --bg: #f4f7f6; --danger: #b21f1f; --gray: #95a5a6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; color: #333; }

        .header { 
            background: linear-gradient(135deg, var(--primary), var(--danger)); 
            color: white; padding: 30px 20px; border-radius: 15px; 
            text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 14px; border: none; border-radius: 10px; 
            background: #e0e0e0; cursor: pointer; font-weight: bold; 
            transition: 0.3s; color: #666;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .event-card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--primary);
        }

        .event-info h3 { margin: 0; color: var(--primary); font-size: 18px; }
        .event-info p { margin: 5px 0; color: #666; font-size: 14px; line-height: 1.4; }
        .event-date { color: var(--danger); font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .deadline-msg { color: var(--danger); font-size: 11px; font-weight: bold; margin-top: 5px; display: block; }
        
        .join-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px 18px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; min-width: 100px;
        }
        .join-btn:disabled { background: var(--gray); cursor: not-allowed; opacity: 0.7; }

        /* Modal Styling */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { 
            background: white; padding: 25px; border-radius: 20px; 
            width: 95%; max-width: 450px; position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 24px; color: #999; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; color: #777; display: block; margin-bottom: 4px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 10px; border: 2px solid #eee; 
            border-radius: 8px; outline: none; font-size: 14px;
        }
        input[readonly] { background-color: #f9f9f9; color: #555; }
        input:focus { border-color: var(--primary); }

        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;"><i class="fa-solid fa-calendar-day"></i> School Calendar</h1>
    <p style="margin:5px 0 0 0; opacity:0.9;">Events, Holidays & Deadlines</p>
</div>

<div class="tabs">
    <button id="btn-events" class="tab-btn active" onclick="showSection('events')">Events</button>
    <button id="btn-holidays" class="tab-btn" onclick="showSection('holidays')">Holidays</button>
</div>

<div id="events-list">
    <p style="text-align:center; padding:20px; color:#999;">Updating calendar...</p>
</div>

<a href="main.html" class="back-link">← Back to Dashboard</a>

<div id="joinModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 style="margin-top:0; color:var(--primary);">Confirm Participation</h3>
        <p style="font-size: 14px; margin-bottom: 15px;">Event: <span id="targetEventName" style="color:var(--danger); font-weight:bold;"></span></p>
        
        <form id="participationForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Student Name</label>
                    <input type="text" id="pName" readonly>
                </div>
                <div class="form-group">
                    <label>Adm No</label>
                    <input type="text" id="pAdm" readonly>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" id="pClass" readonly>
                </div>
                <div class="form-group">
                    <label>Section</label>
                    <input type="text" id="pSection" readonly>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="number" id="pRoll" placeholder="e.g. 1" required>
                </div>
                <div class="form-group">
                    <label>Parent Mobile</label>
                    <input type="number" id="pContact" placeholder="Contact No" required>
                </div>
            </div>
            
            <button type="submit" id="submitJoin" class="join-btn" style="width:100%; margin-top:10px; padding: 15px;">Register Now</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhB6Bc29g-sZCV9MLu_jQCD5GdlhL2mgM",
        authDomain: "amhs-e7f6d.firebaseapp.com",
        projectId: "amhs-e7f6d",
        storageBucket: "amhs-e7f6d.firebasestorage.app",
        messagingSenderId: "226999110651",
        appId: "1:226999110651:web:3746238cb0140f1897d95e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Load Student Info from Storage
    const sData = {
        name: localStorage.getItem("studentName") || "Student",
        adm: localStorage.getItem("admissionNo") || "N/A",
        class: localStorage.getItem("studentClass") || "N/A",
        sec: localStorage.getItem("studentSection") || "N/A"
    };

    let allItems = [];

    async function loadCalendar() {
        const listDiv = document.getElementById('events-list');
        try {
            const q = query(collection(db, "school_calendar"), orderBy("date", "asc"));
            const snap = await getDocs(q);
            allItems = [];
            snap.forEach(doc => allItems.push({ id: doc.id, ...doc.data() }));
            render('events');
        } catch (e) {
            listDiv.innerHTML = "<p style='text-align:center; color:red;'>Sync Error. Please refresh.</p>";
        }
    }

    function render(filter) {
        const listDiv = document.getElementById('events-list');
        let html = "";
        const today = new Date();
        today.setHours(0,0,0,0);

        const filteredData = allItems.filter(item => {
            return filter === 'holidays' ? item.type === 'Holiday' : item.type !== 'Holiday';
        });

        if(filteredData.length === 0) {
            listDiv.innerHTML = `<p style='text-align:center; padding:30px; color:#999;'>No ${filter} listed.</p>`;
            return;
        }

        filteredData.forEach(item => {
            const isComp = item.type === "Competition";
            const eventDate = new Date(item.date);
            eventDate.setHours(0,0,0,0);
            
            // Calculate Day Difference
            const diffDays = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
            
            let actionBtn = "";
            let warning = "";

            if (isComp) {
                if (diffDays > 2) {
                    actionBtn = `<button class="join-btn" onclick="openModal('${item.title}')">Join</button>`;
                } else if (diffDays <= 2 && diffDays >= 0) {
                    actionBtn = `<button class="join-btn" disabled>Closed</button>`;
                    warning = `<span class="deadline-msg">Registration closed (2-day deadline)</span>`;
                } else {
                    actionBtn = `<span style="color:#999; font-size:12px;">Expired</span>`;
                }
            }

            html += `
                <div class="event-card" style="border-left-color: ${item.type === 'Holiday' ? '#ff7675' : '#1a2a6c'}">
                    <div class="event-info">
                        <div class="event-date">${item.date}</div>
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                        ${warning}
                    </div>
                    ${actionBtn}
                </div>
            `;
        });
        listDiv.innerHTML = html;
    }

    // --- Global Window Functions ---
    window.showSection = (type) => {
        document.getElementById('btn-events').classList.toggle('active', type === 'events');
        document.getElementById('btn-holidays').classList.toggle('active', type === 'holidays');
        render(type);
    };

    window.openModal = (title) => {
        document.getElementById('targetEventName').innerText = title;
        document.getElementById('pName').value = sData.name;
        document.getElementById('pAdm').value = sData.adm;
        document.getElementById('pClass').value = sData.class;
        document.getElementById('pSection').value = sData.sec;
        document.getElementById('joinModal').style.display = 'flex';
    };

    window.closeModal = () => {
        document.getElementById('joinModal').style.display = 'none';
    };

    // --- Participation Submission ---
    document.getElementById('participationForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitJoin');
        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            await addDoc(collection(db, "event_participations"), {
                studentName: sData.name,
                admissionNo: sData.adm,
                class: sData.class,
                section: sData.sec,
                rollNo: document.getElementById('pRoll').value,
                eventName: document.getElementById('targetEventName').innerText,
                contact: document.getElementById('pContact').value,
                timestamp: new Date().getTime()
            });
            
            alert("Application Sent! Good luck.");
            closeModal();
            e.target.reset();
        } catch (error) {
            alert("Error sending application.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Register Now";
        }
    };

    window.onload = loadCalendar;
</script>
</body>
</html>
