    <style>
        :root {
            --brand: #4f46e5;
            --brand-dark: #3730a3;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-title: #0f172a;
            --text-body: #64748b;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            min-height: 100vh; 
            background: var(--bg); 
            position: relative; 
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        /* Top Navigation */
        .top-nav {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #f1f5f9;
        }

        .logo-text { font-weight: 800; font-size: 20px; color: var(--brand); letter-spacing: -0.5px; }

        .logout-pill {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-pill:active { transform: scale(0.95); opacity: 0.8; }

        /* Header Splash */
        .header-splash {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            padding: 40px 25px;
            color: white;
            border-radius: 0 0 30px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15);
        }

        .header-splash h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        
        /* Working Last Opened Badge */
        .last-opened-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 15px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Action Grid */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 0 20px 40px; 
        }

        .menu-item {
            background: var(--surface);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            border: 1px solid #eef2f6;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.04);
        }

        .menu-item:active { transform: scale(0.96); background: #fafafa; }

        .icon-box {
            width: 56px; height: 56px;
            background: #f1f5f9;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }

        .icon-box svg { width: 28px; height: 28px; stroke: var(--text-title); stroke-width: 2; fill: none; }

        .menu-item span { font-weight: 700; color: var(--text-title); font-size: 15px; }
.settings-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    color: #555;
    text-decoration: none;
    font-size: 24px;
    transition: transform 0.3s ease, color 0.3s ease;
}

.settings-link:hover {

}

        /* Timetable Special Style */

        /* Admin Style */
        .item-admin { 
            grid-column: span 2;

            background: #1e293b;

            width: 40px; 
            height: 40px;

        .item-admin .icon-box svg { stroke: white; width: 20px; height: 20px; }

        /* MODAL (Bottom Sheet) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            justify-content: center; align-items: flex-end; z-index: 100;
        }

        .modal-content {
            background: white; width: 100%; max-width: 500px; padding: 30px;
            border-radius: 30px 30px 0 0; text-align: center;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-action-btn {
            width: 100%; padding: 16px; border-radius: 16px; border: 1px solid #e2e8f0;
            background: #f8fafc; margin-bottom: 12px; font-weight: 700; font-size: 16px;
            color: var(--brand); cursor: pointer; transition: 0.2s;
        }
        .modal-action-btn:hover { background: var(--brand); color: white; }

        .close-link { color: var(--text-body); font-weight: 600; cursor: pointer; display: block; margin-top: 15px; font-size: 14px; }
    </style>

  <script type="module">
    // 1. IMPORT FIREBASE FUNCTIONS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        query, 
        where, 
        onSnapshot, 
        orderBy, 
        limit 
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // 2. YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBhB6Bc29g-sZCV9MLu_jQCD5GdlhL2mgM",
        authDomain: "amhs-e7f6d.firebaseapp.com",
        projectId: "amhs-e7f6d",
        storageBucket: "amhs-e7f6d.firebasestorage.app",
        messagingSenderId: "226999110651",
        appId: "1:226999110651:web:3746238cb0140f1897d95e"
    };

    // 3. INITIALIZE FIREBASE
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- REAL-TIME FUNCTIONALITY ---
    window.onload = function() {
        const name = localStorage.getItem("studentName") || "Student";
        
        // Smart Greeting
        const hours = new Date().getHours();
        let greet = "Hello";
        if (hours < 12) greet = "Good Morning";
        else if (hours < 17) greet = "Good Afternoon";
        else greet = "Good Evening";
        document.getElementById("greeting-text").innerHTML = `${greet}, <span id="display-name">${name}</span>!`;

        // 4. ATTENDANCE NOTIFICATION LISTENER
        const myAdmNo = localStorage.getItem("admissionNo");
        if (myAdmNo) {
            const q = query(
                collection(db, "student_notices"), 
                where("targetAdmissionNo", "==", myAdmNo), 
                orderBy("timestamp", "desc"), 
                limit(1)
            );

            onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const now = new Date().getTime();
                        
                        // Show notice if sent in last 5 minutes
                        if (now - data.timestamp < 999999) {
                            const popup = document.getElementById('notif-popup');
                            const header = document.getElementById('notif-header');
                            const msg = document.getElementById('notif-msg');

                            msg.innerText = data.message;
                            header.style.background = (data.type === 'success') ? '#27ae60' : '#b21f1f';
                            popup.style.display = 'block';
                        }
                    }
                });
            }, (error) => {
                console.error("Index needed! Check console for link:", error);
            });
        }

        // 5. LAST OPENED LOGIC
        const lastSession = localStorage.getItem("real_last_opened");
        if (lastSession) {
            document.getElementById("last-opened-text").innerText = "Last session: " + lastSession;
        } else {
            document.getElementById("last-opened-text").innerText = "Welcome to your first login!";
        }

        const now = new Date();
        const formattedTime = now.toLocaleDateString([], { day: '2-digit', month: 'short' }) + " at " + 
                              now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
        localStorage.setItem("real_last_opened", formattedTime);
    };

    // --- NAVIGATION & UI LOGIC ---
    window.toggleModal = function(show) {
        document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
    }

    window.logout = function() {
        if (confirm("Confirm Logout? Session data will be cleared.")) {
            localStorage.clear();
            window.location.href = "index.html";
        }
    }

    window.onclick = function(e) {
        if (e.target == document.getElementById('modalOverlay')) toggleModal(false);
    }
</script>
